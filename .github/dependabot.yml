version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      react-stack:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
          - "@vitejs/plugin-react"
      vite-stack:
        patterns:
          - vite
          - "@vitejs/plugin-react"
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
